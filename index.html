document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-weight:800;letter-spacing:0.05em;\">MEMBRE 5<\u002Fspan>\n        <span style=\"font-size:9.5pt;color:#6B6F85;font-weight:700;padding-bottom:3px;\">Prénom<\u002Fspan>\n        <input data-field=\"m5nom\" type=\"text\" style=\"border:none;border-bottom:2px solid #D9DDEA;background:transparent;height:24px;font-size:10.5pt;color:#21243B;outline:none;width:200px;border-radius:0;padding:0 2px;\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"display:flex;align-items:flex-end;gap:12px;\"><span style=\"font-size:10pt;font-weight:800;color:#2547D8;width:16px;\">1.<\u002Fspan><input data-field=\"m5t1\" type=\"text\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;height:26px;font-size:10.5pt;color:#21243B;outline:none;flex:1;border-radius:0;padding:0 2px;\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-end;gap:12px;\"><span style=\"font-size:10pt;font-weight:800;color:#2547D8;width:16px;\">2.<\u002Fspan><input data-field=\"m5t2\" type=\"text\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;height:26px;font-size:10.5pt;color:#21243B;outline:none;flex:1;border-radius:0;padding:0 2px;\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-end;gap:12px;\"><span style=\"font-size:10pt;font-weight:800;color:#2547D8;width:16px;\">3.<\u002Fspan><input data-field=\"m5t3\" type=\"text\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;height:26px;font-size:10.5pt;color:#21243B;outline:none;flex:1;border-radius:0;padding:0 2px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ ÉTAPE 2 ═══ -->\n    <div style=\"break-inside:avoid;\">\n      <div style=\"display:flex;align-items:center;gap:14px;background:#DCEBF8;border-radius:12px;padding:12px 18px;margin:24px 0 8px;\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:#2547D8;color:#FFFFFF;font-size:14pt;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">2<\u002Fdiv>\n        <div style=\"font-size:14pt;font-weight:800;color:#16307A;\">Positionner chaque tâche sur la matrice<\u002Fdiv>\n        <div style=\"margin-left:auto;background:#FFFFFF;border-radius:999px;padding:5px 14px;font-size:9pt;color:#2547D8;font-weight:800;letter-spacing:0.04em;\">SOUS-GROUPE · 45 MIN<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 14px;font-size:10pt;color:#4A4E63;\">Reportez chaque tâche (initiales + n°, ex. « ML-2 ») dans son quadrant. <strong style=\"color:#16307A;\">Impact<\u002Fstrong> = temps gagné × personnes concernées. <strong style=\"color:#16307A;\">Faisabilité<\u002Fstrong> = données non sensibles, tâche bien définie.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:30px 1fr;grid-template-rows:1fr 26px;\">\n        <div style=\"display:flex;align-items:center;justify-content:center;\">\n          <div style=\"transform:rotate(-90deg);white-space:nowrap;font-size:9.5pt;font-weight:800;color:#2547D8;letter-spacing:0.1em;text-transform:uppercase;\">Impact →<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;grid-template-rows:190px 190px;gap:10px;\">\n          <div style=\"border:1.5px solid #D9DDEA;background:#FAFBFE;border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;\">\n            <span style=\"font-size:10.5pt;font-weight:800;color:#16307A;\">À préparer<\u002Fspan><span style=\"font-size:8.5pt;color:#9A9EB0;\">fort impact · à débloquer<\u002Fspan>\n            <textarea data-field=\"quad-preparer\" style=\"border:none;background:transparent;resize:none;outline:none;flex:1;margin-top:6px;font-size:10.5pt;color:#21243B;line-height:1.5;\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"border:2.5px solid #2547D8;background:#F0F6FC;border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;\">\n            <span style=\"font-size:10.5pt;font-weight:800;color:#2547D8;\">★ Priorités<\u002Fspan><span style=\"font-size:8.5pt;color:#6B8CD8;\">fort impact · faisable maintenant<\u002Fspan>\n            <textarea data-field=\"quad-priorites\" style=\"border:none;background:transparent;resize:none;outline:none;flex:1;margin-top:6px;font-size:10.5pt;color:#21243B;line-height:1.5;\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"border:1.5px solid #D9DDEA;background:#FAFBFE;border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;\">\n            <span style=\"font-size:10.5pt;font-weight:800;color:#9A9EB0;\">On laisse de côté<\u002Fspan>\n            <textarea data-field=\"quad-cote\" style=\"border:none;background:transparent;resize:none;outline:none;flex:1;margin-top:6px;font-size:10.5pt;color:#21243B;line-height:1.5;\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"border:1.5px solid #D9DDEA;background:#FAFBFE;border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;\">\n            <span style=\"font-size:10.5pt;font-weight:800;color:#16307A;\">Gains rapides<\u002Fspan><span style=\"font-size:8.5pt;color:#9A9EB0;\">facile · parfait pour s'entraîner<\u002Fspan>\n            <textarea data-field=\"quad-gains\" style=\"border:none;background:transparent;resize:none;outline:none;flex:1;margin-top:6px;font-size:10.5pt;color:#21243B;line-height:1.5;\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:center;font-size:9.5pt;font-weight:800;color:#2547D8;letter-spacing:0.1em;text-transform:uppercase;\">Faisabilité →<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ ÉTAPE 3 ═══ -->\n    <div style=\"break-inside:avoid;\">\n      <div style=\"display:flex;align-items:center;gap:14px;background:#FFE8DF;border-radius:12px;padding:12px 18px;margin:24px 0 8px;\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:#EE6A45;color:#FFFFFF;font-size:14pt;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">3<\u002Fdiv>\n        <div style=\"font-size:14pt;font-weight:800;color:#16307A;\">Analyser votre cas d'usage prioritaire<\u002Fdiv>\n        <div style=\"margin-left:auto;background:#FFFFFF;border-radius:999px;padding:5px 14px;font-size:9pt;color:#EE6A45;font-weight:800;letter-spacing:0.04em;\">AVANT RESTITUTION<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 14px;font-size:10pt;color:#4A4E63;\">Choisissez la tâche la mieux placée dans « Priorités » et remplissez sa fiche d'identité.<\u002Fp>\n\n      <div style=\"border:1.5px solid #D9DDEA;border-radius:12px;overflow:hidden;\">\n        <div style=\"padding:14px 20px 18px;border-bottom:1.5px solid #EDEFF6;\">\n          <div style=\"font-size:9.5pt;font-weight:800;color:#2547D8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;\">Tâche concernée — en une phrase concrète<\u002Fdiv>\n          <textarea data-field=\"tache\" rows=\"2\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;resize:none;outline:none;width:100%;font-size:10.5pt;color:#21243B;line-height:1.6;box-sizing:border-box;padding:0 2px;\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <div style=\"padding:14px 20px;border-bottom:1.5px solid #EDEFF6;\">\n          <div style=\"font-size:9.5pt;font-weight:800;color:#2547D8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;\">Données manipulées<\u002Fdiv>\n          <div style=\"display:flex;gap:26px;flex-wrap:wrap;font-size:10.5pt;align-items:center;\">\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"don-aucune\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>Aucune donnée personnelle<\u002Fspan><\u002Flabel>\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"don-anonymisables\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>Personnelles, anonymisables<\u002Fspan><\u002Flabel>\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"don-sensibles\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>Sensibles (usagers, santé, social)<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 20px;border-bottom:1.5px solid #EDEFF6;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:26px;\">\n          <div>\n            <div style=\"font-size:9.5pt;font-weight:800;color:#2547D8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;\">Gain de temps estimé<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:8px;font-size:10.5pt;color:#4A4E63;flex-wrap:wrap;\">\n              <input data-field=\"gain-heures\" type=\"text\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;height:24px;font-size:10.5pt;color:#21243B;outline:none;width:70px;text-align:center;border-radius:0;\">\n              <span>h / mois, pour<\u002Fspan>\n              <input data-field=\"gain-personnes\" type=\"text\" style=\"border:none;border-bottom:1.5px solid #D9DDEA;background:transparent;height:24px;font-size:10.5pt;color:#21243B;outline:none;width:50px;text-align:center;border-radius:0;\">\n              <span>pers.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:9.5pt;font-weight:800;color:#2547D8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;\">Risques RGPD<\u002Fdiv>\n            <div style=\"display:flex;gap:20px;flex-wrap:wrap;font-size:10.5pt;align-items:center;\">\n              <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"rgpd-aucun\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>Aucun<\u002Fspan><\u002Flabel>\n              <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"rgpd-maitrisables\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>Maîtrisables<\u002Fspan><\u002Flabel>\n              <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"rgpd-dpo\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>À valider avec le DPO<\u002Fspan><\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px 20px;\">\n          <div style=\"font-size:9.5pt;font-weight:800;color:#2547D8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;\">Niveau d'automatisation visé<\u002Fdiv>\n          <div style=\"display:flex;gap:22px;flex-wrap:wrap;font-size:10.5pt;align-items:center;\">\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"niv-prompt\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>1 · Prompt réutilisable<\u002Fspan><\u002Flabel>\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"niv-projet\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>2 · Projet Claude<\u002Fspan><\u002Flabel>\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"niv-connecteurs\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>3 · Connecteurs<\u002Fspan><\u002Flabel>\n            <label style=\"display:inline-flex;align-items:center;gap:8px;cursor:pointer;\"><input data-field=\"niv-workflow\" type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#2547D8;margin:0;\"><span>4 · Workflow automatisé<\u002Fspan><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ RESTITUTION ═══ -->\n    <div style=\"break-inside:avoid;margin-top:24px;background:#16307A;border-radius:14px;padding:20px 24px;\">\n      <div style=\"font-size:13pt;font-weight:800;color:#FFFFFF;margin-bottom:4px;\">Pour la restitution collective<\u002Fdiv>\n      <p style=\"margin:0 0 14px;font-size:10pt;color:#BFD3FF;\">Une phrase à présenter à la salle : la tâche, le gain attendu et le garde-fou humain prévu.<\u002Fp>\n      <textarea data-field=\"restitution\" rows=\"3\" style=\"border:none;border-bottom:1.5px solid rgba(255,255,255,0.4);background:transparent;resize:none;outline:none;width:100%;font-size:11pt;color:#FFFFFF;line-height:1.7;box-sizing:border-box;padding:0 2px;margin-bottom:16px;\"><\u002Ftextarea>\n      <div style=\"display:flex;align-items:flex-end;gap:12px;font-size:10.5pt;\">\n        <span style=\"font-weight:800;color:#FFB59B;white-space:nowrap;padding-bottom:3px;\">Première action dès demain :<\u002Fspan>\n        <input data-field=\"action\" type=\"text\" style=\"border:none;border-bottom:1.5px solid rgba(255,255,255,0.4);background:transparent;height:26px;font-size:10.5pt;color:#FFFFFF;outline:none;flex:1;border-radius:0;padding:0 2px;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:16px;display:flex;gap:10px;align-items:center;\">\n      <div style=\"width:6px;height:6px;border-radius:50%;background:#EE6A45;flex-shrink:0;\"><\u002Fdiv>\n      <div style=\"font-size:9pt;color:#6B6F85;\">Vos réponses sont enregistrées automatiquement dans ce navigateur. Rappel : jamais de données identifiantes dans l'outil · relecture humaine systématique · en cas de doute RGPD, contacter le DPO.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._bound = new WeakSet();\n    this._key = 'fiche-atelier-irts-v1';\n    try { this._saved = JSON.parse(localStorage.getItem(this._key)) || {}; } catch (e) { this._saved = {}; }\n    this._timer = setInterval(() => this._bind(), 400);\n    this._bind();\n  }\n\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n  }\n\n  _bind() {\n    const els = document.querySelectorAll('[data-field]');\n    if (!els.length) return;\n    els.forEach((el) => {\n      if (this._bound.has(el)) return;\n      this._bound.add(el);\n      const k = el.getAttribute('data-field');\n      if (el.type === 'checkbox') {\n        if (this._saved[k]) el.checked = true;\n      } else if (k in this._saved) {\n        el.value = this._saved[k];\n      }\n      const save = () => {\n        this._saved[k] = el.type === 'checkbox' ? el.checked : el.value;\n        localStorage.setItem(this._key, JSON.stringify(this._saved));\n      };\n      el.addEventListener('input', save);\n      el.addEventListener('change', save);\n    });\n  }\n\n  renderVals() {\n    return {\n      exportPdf: () => window.print()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
